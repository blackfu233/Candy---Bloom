<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Candy Cascade Board</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-stage">
      <div class="game-shell">
        <header class="brand-bar" aria-label="Game title">
          <div>
            <span>Candy Bloom</span>
            <strong>Sweet Board</strong>
          </div>
          <p>Adjustable Bet</p>
        </header>

        <section class="top-bar" aria-label="Wallet status">
          <div>
            <p class="label">Balance</p>
            <strong id="balance">100.00</strong>
          </div>
          <div>
            <p class="label">Win</p>
            <strong id="win">0.00</strong>
          </div>
          <button id="restart" type="button" title="Restart" aria-label="Restart"></button>
        </section>

        <section class="meter-bar" aria-label="Feature progress">
          <div>
            <span>Scatter</span>
            <strong id="scatter">0 / 5</strong>
          </div>
          <div>
            <span>Board Event</span>
            <strong id="event-countdown">10 Moves</strong>
          </div>
          <div>
            <span>Candy Fever</span>
            <meter id="fever-meter" min="0" max="100" value="0"></meter>
          </div>
        </section>

        <section class="board-wrap" aria-label="Candy board">
          <div id="board" class="board"></div>
        </section>

        <section class="status-line" aria-live="polite">
          <span id="message">Pick 2 adjacent candies. Valid match = 1 BET.</span>
          <span id="cascade-label"></span>
        </section>

        <section class="tool-bar" aria-label="Tools">
          <div class="bet-panel">
            <span>Bet per Swap</span>
            <div class="bet-stepper" aria-label="Bet controls">
              <button id="bet-down" type="button" aria-label="Decrease bet">-</button>
              <strong id="bet">1.00</strong>
              <button id="bet-up" type="button" aria-label="Increase bet">+</button>
            </div>
          </div>
          <button id="shuffle" type="button">Shuffle <small id="shuffle-cost">Cost 1 BET</small></button>
          <button id="hint" type="button">Hint</button>
          <label class="toggle">
            <input id="turbo" type="checkbox" />
            <span>Turbo</span>
          </label>
        </section>
      </div>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
