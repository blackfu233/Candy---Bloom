<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Candy Cascade Board</title>
    <link rel="stylesheet" href="./styles.css?v=20260605-no-zoom" />
  </head>
  <body>
    <main class="phone-stage">
      <div class="game-shell">
        <header class="brand-bar" aria-label="Game title">
          <div>
            <span>Candy Bloom</span>
            <strong>Sweet Board</strong>
          </div>
          <p>Adjustable Bet</p>
        </header>

        <section class="top-bar" aria-label="Wallet status">
          <div>
            <p class="label">Balance</p>
            <strong id="balance">100.00</strong>
          </div>
          <div>
            <p class="label">Win</p>
            <strong id="win">0.00</strong>
          </div>
          <button id="restart" type="button" title="Restart" aria-label="Restart"></button>
        </section>

        <section class="meter-bar fever-focus" aria-label="Candy Fever capsules">
          <div>
            <span>Candy Fever</span>
            <strong>Capsules 0/3</strong>
            <div id="fever-capsules" class="capsule-track" aria-label="Fever Capsules collected">
              <i class="capsule-slot"></i>
              <i class="capsule-slot"></i>
              <i class="capsule-slot"></i>
            </div>
          </div>
          <p>Collect 3 capsules to spin the Fever Wheel.</p>
        </section>

        <section class="board-wrap" aria-label="Candy board">
          <div id="board" class="board"></div>
          <div class="collection-tray" aria-label="Reward collection">
            <span>Fever Capsules</span>
            <b></b>
            <b></b>
            <b></b>
          </div>
        </section>

        <section class="status-line" aria-live="polite">
          <span id="message">Keep 3 Fever Capsules on the board to spin the Fever Wheel.</span>
          <span id="cascade-label"></span>
        </section>

        <section class="tool-bar" aria-label="Tools">
          <div class="bet-panel">
            <span>Bet per Swap</span>
            <div class="bet-stepper" aria-label="Bet controls">
              <button id="bet-down" type="button" aria-label="Decrease bet">-</button>
              <strong id="bet">1.00</strong>
              <button id="bet-up" type="button" aria-label="Increase bet">+</button>
            </div>
          </div>
          <button id="shuffle" type="button">Shuffle <small id="shuffle-cost">Cost 1 BET</small></button>
          <button id="hint" type="button">Hint</button>
          <label class="toggle">
            <input id="turbo" type="checkbox" />
            <span>Turbo</span>
          </label>
        </section>
      </div>
    </main>

    <script src="./game.js?v=20260603-capsule-wheel15"></script>
  </body>
</html>
